name: Deploy to GitHub Pages

on:
  # Trigger on push to main branch
  push:
    branches: [ "main" ]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Expose the upload step output to the deploy job. Step outputs
    # only exist within the same job; passing them across needs the
    # job-level outputs field below.
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build website
        run: npm run build

      - name: Upload artifact
        id: upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        env:
          ARTIFACT_ID: ${{ needs.build.outputs.artifact_id }}
          REPOSITORY: ${{ github.repository }}
          MAX_ATTEMPTS: 3
          RETRY_WAIT_SECONDS: 30
        run: |
          # Bypass actions/deploy-pages and call the Pages deployment API
          # directly so we can wrap it in a real retry loop. The action is
          # just a thin wrapper around POST /repos/:owner/:repo/pages/deployments.
          echo "Fetching OIDC token..."
          OIDC_TOKEN=$(curl -fsS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pages" \
            | jq -r .value)

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "::error::Failed to obtain OIDC token"
            exit 1
          fi

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "::group::Deploy attempt $attempt of $MAX_ATTEMPTS"

            HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $OIDC_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages/deployments" \
              -d "$(jq -n \
                --argjson artifact_id "$ARTIFACT_ID" \
                --arg oidc_token "$OIDC_TOKEN" \
                '{artifact_id: $artifact_id, oidc_token: $oidc_token}')")

            echo "HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "202" ]; then
              PAGE_URL=$(jq -r '.page_url // empty' response.json 2>/dev/null || echo "")
              DEPLOYMENT_ID=$(jq -r '.id // empty' response.json 2>/dev/null || echo "")
              echo "page_url=$PAGE_URL" >> "$GITHUB_OUTPUT"
              echo "Deployment initiated: id=$DEPLOYMENT_ID url=$PAGE_URL"
              jq . response.json 2>/dev/null || cat response.json
              echo "::endgroup::"
              exit 0
            fi

            echo "Attempt failed:"
            jq . response.json 2>/dev/null || cat response.json || echo "(no response body)"

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting ${RETRY_WAIT_SECONDS}s before retry..."
              sleep "$RETRY_WAIT_SECONDS"
            fi

            echo "::endgroup::"
          done

          echo "::error::All $MAX_ATTEMPTS deployment attempts failed"
          exit 1